<figure class="wp-block-table"><table class="has-fixed-layout"><thead><tr><th>Current Informational Web Pages</th><th>Californian-Focused Digital Services</th></tr></thead><tbody><tr><td>You have to know to go to the California Department of Social Services website, click on Benefits &amp; Services, click on Food &amp; Nutrition Services, click on Food Banks, then scroll through the alphabetical list of counties.<br><figure class="wp-block-image size-large"><img loading="lazy" decoding="async" width="955" height="1024" src="https://live-digital-ca-gov.pantheonsite.io/wp-content/uploads/2026/05/food-bank-cdss-955x1024.jpg" alt="State site screenshot" class="wp-image-3635" srcset="https://live-digital-ca-gov.pantheonsite.io/wp-content/uploads/2026/05/food-bank-cdss-955x1024.jpg 955w, https://live-digital-ca-gov.pantheonsite.io/wp-content/uploads/2026/05/food-bank-cdss-537x576.jpg 537w, https://live-digital-ca-gov.pantheonsite.io/wp-content/uploads/2026/05/food-bank-cdss-768x824.jpg 768w, https://live-digital-ca-gov.pantheonsite.io/wp-content/uploads/2026/05/food-bank-cdss.jpg 1286w" sizes="auto, (max-width: 955px) 100vw, 955px" /></figure><br>A text list of resources on a website broken up by county presents unnecessary hassles for Californians looking for services. People don&#8217;t always know their county, or live in a county that begins with a letter at the end of the alphabet and have to scroll to the end.</td><td>On the site Alpha.ca.gov that ODI created, you click on “Find food banks near you,” type in your city or zip code and press search. Food banks including those in other counties but near you pop up along with a map and links to get directions.<br><figure class="wp-block-image size-large"><img loading="lazy" decoding="async" width="955" height="1024" src="https://live-digital-ca-gov.pantheonsite.io/wp-content/uploads/2026/05/food-bank-alpha-955x1024.jpg" alt="alpha.ca.gov Find a foodbank page" class="wp-image-3636" srcset="https://live-digital-ca-gov.pantheonsite.io/wp-content/uploads/2026/05/food-bank-alpha-955x1024.jpg 955w, https://live-digital-ca-gov.pantheonsite.io/wp-content/uploads/2026/05/food-bank-alpha-537x576.jpg 537w, https://live-digital-ca-gov.pantheonsite.io/wp-content/uploads/2026/05/food-bank-alpha-768x824.jpg 768w, https://live-digital-ca-gov.pantheonsite.io/wp-content/uploads/2026/05/food-bank-alpha.jpg 1286w" sizes="auto, (max-width: 955px) 100vw, 955px" /></figure><br>1. Type your city or zip code and press search.<br>2. See the distance, name, address, website and phone number of nearby food banks and buttons to get directions.<br>3. See each food bank on the map.</td></tr></tbody></table></figure>
